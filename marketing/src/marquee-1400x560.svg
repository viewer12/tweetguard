<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <!-- 推文卡片轻阴影 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- 被隐藏推文的虚线占位 -->
    <pattern id="hideStripe" patternUnits="userSpaceOnUse" width="14" height="14" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#E2E8F0" stroke-width="6"/>
    </pattern>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- ═══════════ 左侧 hero ═══════════ -->
  <g transform="translate(96, 120)">
    <!-- logo + 品牌名 -->
    <g transform="scale(0.55)">
      <rect width="128" height="128" rx="28" fill="#0F172A"/>
      <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
      <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="88" y="50" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
          font-size="38" font-weight="700" fill="#0F172A" letter-spacing="-0.8">TweetGuard</text>

    <!-- 主标语 -->
    <text x="0" y="170" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
          font-size="54" font-weight="700" fill="#0F172A" letter-spacing="-1.5">静默过滤 X 信息流</text>
    <text x="0" y="232" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
          font-size="54" font-weight="700" fill="#0F172A" letter-spacing="-1.5">里的垃圾推文</text>

    <!-- 副标 -->
    <text x="0" y="278" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
          font-size="18" font-weight="400" fill="#475569" letter-spacing="-0.1">色情 bot · 加密引流 · 营销号 · 钓鱼链接</text>

    <!-- 卖点列表 -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif" font-size="16" fill="#0F172A">
      <g transform="translate(0, 320)">
        <circle cx="10" cy="10" r="3" fill="#059669"/>
        <text x="28" y="15" font-weight="500">五重检测:名单 → 缓存 → 规则 → 评分 → AI 复审</text>
      </g>
      <g transform="translate(0, 354)">
        <circle cx="10" cy="10" r="3" fill="#059669"/>
        <text x="28" y="15" font-weight="500">完全本地运行,无服务器、无遥测</text>
      </g>
      <g transform="translate(0, 388)">
        <circle cx="10" cy="10" r="3" fill="#059669"/>
        <text x="28" y="15" font-weight="500">自带 AI Key,支持 7 个 provider(DeepSeek/OpenAI/Claude...)</text>
      </g>
    </g>
  </g>

  <!-- ═══════════ 右侧 mockup:推文流过滤前后对比 ═══════════ -->
  <g transform="translate(820, 90)">
    <!-- mockup 容器 -->
    <rect width="492" height="400" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

    <!-- mockup 顶栏标签 "for you" 风格 -->
    <text x="28" y="40" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">For you</text>
    <line x1="20" y1="56" x2="200" y2="56" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="64" x2="492" y2="64" stroke="#E2E8F0" stroke-width="1"/>

    <!-- ─── 推文 1:正常 ─── -->
    <g transform="translate(20, 84)">
      <circle cx="20" cy="20" r="20" fill="#0F172A"/>
      <text x="50" y="18" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#0F172A">@dev_jane</text>
      <text x="124" y="18" font-family="-apple-system, sans-serif" font-size="13" fill="#94A3B8">· 2h</text>
      <text x="50" y="38" font-family="-apple-system, sans-serif" font-size="13" fill="#334155">刚试了下新的扩展挺好用,效果立竿见影</text>
      <text x="50" y="56" font-family="-apple-system, sans-serif" font-size="13" fill="#334155">推荐给同样被骚扰烦的朋友</text>
    </g>
    <line x1="0" y1="180" x2="492" y2="180" stroke="#F1F5F9" stroke-width="1"/>

    <!-- ─── 推文 2:已隐藏(silent hide,显示瘦化条带占位)─── -->
    <g transform="translate(20, 196)">
      <rect x="0" y="0" width="452" height="42" rx="10" fill="url(#hideStripe)" opacity="0.6"/>
      <!-- 中间徽标 -->
      <g transform="translate(186, 9)">
        <rect width="80" height="24" rx="12" fill="#0F172A"/>
        <text x="40" y="16" font-family="-apple-system, sans-serif"
              font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">已隐藏</text>
      </g>
    </g>
    <line x1="0" y1="254" x2="492" y2="254" stroke="#F1F5F9" stroke-width="1"/>

    <!-- ─── 推文 3:正常 ─── -->
    <g transform="translate(20, 270)">
      <circle cx="20" cy="20" r="20" fill="#475569"/>
      <text x="50" y="18" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#0F172A">@nick_w</text>
      <text x="110" y="18" font-family="-apple-system, sans-serif" font-size="13" fill="#94A3B8">· 3h</text>
      <text x="50" y="38" font-family="-apple-system, sans-serif" font-size="13" fill="#334155">这套规则总结挺有意思的,完全本地</text>
      <text x="50" y="56" font-family="-apple-system, sans-serif" font-size="13" fill="#334155">不上传任何东西,值得试一下</text>
    </g>
    <line x1="0" y1="362" x2="492" y2="362" stroke="#F1F5F9" stroke-width="1"/>

    <!-- ─── 推文 4:已隐藏 ─── -->
    <g transform="translate(20, 374)">
      <rect x="0" y="0" width="452" height="14" rx="7" fill="url(#hideStripe)" opacity="0.5"/>
    </g>
  </g>

  <!-- 右下角小标:explainer -->
  <g transform="translate(820, 500)">
    <circle cx="10" cy="10" r="3" fill="#059669"/>
    <text x="28" y="15" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="14" fill="#475569">默默隐藏 — 不打扰浏览,正常推文照常显示</text>
  </g>
</svg>
