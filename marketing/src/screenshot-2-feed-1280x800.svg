<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif">
  <!-- 仿真 x.com 信息流被 TweetGuard 处理后的效果 -->

  <!-- 浏览器壳 -->
  <rect width="1280" height="800" fill="#E2E8F0"/>
  <rect x="0" y="0" width="1280" height="48" fill="#F1F5F9"/>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <rect x="92" y="14" width="380" height="20" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="106" y="28" font-size="11" fill="#94A3B8">x.com/home</text>
  <text x="1180" y="28" font-size="11" fill="#475569" text-anchor="end">X</text>

  <!-- x.com 主体:仿照 X 的真实信息流 -->
  <rect x="0" y="48" width="1280" height="752" fill="#FFFFFF"/>

  <!-- 左侧 X 导航(简化 240px) -->
  <rect x="0" y="48" width="240" height="752" fill="#FFFFFF"/>
  <line x1="240" y1="48" x2="240" y2="800" stroke="#EFF3F4" stroke-width="1"/>
  <g transform="translate(36, 88)">
    <!-- X logo -->
    <text font-size="22" font-weight="700" fill="#0F1419">𝕏</text>
    <!-- nav items -->
    <g font-size="15" font-weight="400" fill="#0F1419">
      <text y="70">主页</text>
      <text y="110">探索</text>
      <text y="150">通知</text>
      <text y="190">消息</text>
      <text y="230">书签</text>
      <text y="270">列表</text>
      <text y="310">社区</text>
      <text y="350">个人资料</text>
      <text y="390">更多</text>
    </g>
    <rect x="-12" y="446" width="160" height="44" rx="22" fill="#0F1419"/>
    <text y="474" x="68" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">发帖</text>
  </g>

  <!-- 中间信息流(600 宽,仿 X)-->
  <g transform="translate(240, 48)">
    <rect width="600" height="752" fill="#FFFFFF"/>
    <line x1="600" y1="0" x2="600" y2="752" stroke="#EFF3F4" stroke-width="1"/>

    <!-- 顶部 sticky 头(For you / Following) -->
    <rect width="600" height="52" fill="#FFFFFF" opacity="0.95"/>
    <text x="155" y="32" font-size="14" font-weight="700" fill="#0F1419" text-anchor="middle">为你</text>
    <line x1="115" y1="48" x2="195" y2="48" stroke="#1D9BF0" stroke-width="4" stroke-linecap="round"/>
    <text x="445" y="32" font-size="14" font-weight="500" fill="#536471" text-anchor="middle">正在关注</text>
    <line x1="0" y1="52" x2="600" y2="52" stroke="#EFF3F4"/>

    <!-- 推文 1:正常 -->
    <g transform="translate(0, 52)">
      <circle cx="36" cy="36" r="20" fill="#1E293B"/>
      <text x="68" y="32" font-size="15" font-weight="700" fill="#0F1419">独立开发 Jane</text>
      <text x="180" y="32" font-size="14" fill="#536471">@dev_jane · 2小时</text>
      <text x="68" y="56" font-size="14" fill="#0F1419">刚把开源信息流过滤扩展整合好了,</text>
      <text x="68" y="76" font-size="14" fill="#0F1419">能自动学习中文 spam 模板,</text>
      <text x="68" y="96" font-size="14" fill="#0F1419">最近被色情 bot 烦透的可以试试 🛡️</text>
      <g transform="translate(68, 116)" font-size="13" fill="#536471">
        <text>💬 12</text>
        <text x="80">🔁 86</text>
        <text x="160">❤️ 420</text>
        <text x="240">📊 12.3K</text>
      </g>
      <line x1="0" y1="160" x2="600" y2="160" stroke="#EFF3F4"/>
    </g>

    <!-- 推文 2:silent hide(标准模式 — 显示折叠条带) -->
    <g transform="translate(0, 212)">
      <rect x="16" y="12" width="568" height="48" rx="10" fill="#F7F9F9" stroke="#EFF3F4" stroke-width="1"/>
      <!-- 盾牌图标 -->
      <g transform="translate(28, 25) scale(0.18)">
        <rect width="128" height="128" rx="28" fill="#0F172A"/>
        <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
        <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="68" y="40" font-size="13" font-weight="500" fill="#536471">TweetGuard 已隐藏 1 条推文 · 中文NSFW</text>
      <text x="558" y="40" font-size="12" font-weight="500" fill="#536471" text-anchor="end">展开 ›</text>
      <line x1="0" y1="76" x2="600" y2="76" stroke="#EFF3F4"/>
    </g>

    <!-- 推文 3:正常 -->
    <g transform="translate(0, 300)">
      <circle cx="36" cy="36" r="20" fill="#475569"/>
      <text x="68" y="32" font-size="15" font-weight="700" fill="#0F1419">Nick Wu</text>
      <text x="155" y="32" font-size="14" fill="#536471">@nick_w · 3小时</text>
      <text x="68" y="56" font-size="14" fill="#0F1419">不上传数据这点很关键。本地过滤,</text>
      <text x="68" y="76" font-size="14" fill="#0F1419">规则和 AI Key 都在自己手里,</text>
      <text x="68" y="96" font-size="14" fill="#0F1419">不会被任何第三方再聚合一次。</text>
      <g transform="translate(68, 116)" font-size="13" fill="#536471">
        <text>💬 5</text>
        <text x="80">🔁 28</text>
        <text x="160">❤️ 156</text>
        <text x="240">📊 3.8K</text>
      </g>
      <line x1="0" y1="160" x2="600" y2="160" stroke="#EFF3F4"/>
    </g>

    <!-- 推文 4:silent hide -->
    <g transform="translate(0, 460)">
      <rect x="16" y="12" width="568" height="48" rx="10" fill="#F7F9F9" stroke="#EFF3F4" stroke-width="1"/>
      <g transform="translate(28, 25) scale(0.18)">
        <rect width="128" height="128" rx="28" fill="#0F172A"/>
        <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
        <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="68" y="40" font-size="13" font-weight="500" fill="#536471">TweetGuard 已隐藏 1 条推文 · 加密引流</text>
      <text x="558" y="40" font-size="12" font-weight="500" fill="#536471" text-anchor="end">展开 ›</text>
      <line x1="0" y1="76" x2="600" y2="76" stroke="#EFF3F4"/>
    </g>

    <!-- 推文 5:正常 -->
    <g transform="translate(0, 548)">
      <circle cx="36" cy="36" r="20" fill="#7C3AED"/>
      <text x="68" y="32" font-size="15" font-weight="700" fill="#0F1419">小米团</text>
      <text x="130" y="32" font-size="14" fill="#536471">@miteam · 5小时</text>
      <text x="68" y="56" font-size="14" fill="#0F1419">早上喝了杯不错的咖啡 ☕</text>
      <text x="68" y="76" font-size="14" fill="#0F1419">推荐一家小店,豆子很有意思</text>
      <g transform="translate(68, 96)" font-size="13" fill="#536471">
        <text>💬 2</text>
        <text x="80">🔁 9</text>
        <text x="160">❤️ 88</text>
        <text x="240">📊 1.2K</text>
      </g>
      <line x1="0" y1="140" x2="600" y2="140" stroke="#EFF3F4"/>
    </g>
  </g>

  <!-- 右侧 X 侧栏(简化) -->
  <g transform="translate(840, 48)">
    <rect width="440" height="752" fill="#FFFFFF"/>

    <!-- 搜索框 -->
    <rect x="32" y="24" width="376" height="44" rx="22" fill="#EFF3F4"/>
    <text x="64" y="51" font-size="14" fill="#536471">搜索</text>

    <!-- TweetGuard 状态卡(彰显 brand) -->
    <g transform="translate(32, 96)">
      <rect width="376" height="200" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

      <!-- 卡片头 -->
      <g transform="translate(20, 20)">
        <g transform="scale(0.22)">
          <rect width="128" height="128" rx="28" fill="#0F172A"/>
          <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
          <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="40" y="20" font-size="14" font-weight="700" fill="#0F172A">TweetGuard</text>
        <text x="40" y="34" font-size="11" fill="#94A3B8">本会话已隐藏</text>
      </g>

      <text x="32" y="118" font-size="42" font-weight="700" fill="#0F172A" letter-spacing="-1.5">17</text>
      <text x="92" y="118" font-size="13" fill="#475569">条 spam 推文</text>

      <!-- 分类条 -->
      <g transform="translate(32, 132)" font-size="11">
        <text fill="#475569">中文NSFW</text>
        <text x="200" y="0" fill="#94A3B8" text-anchor="end">9</text>
        <rect x="0" y="6" width="312" height="4" rx="2" fill="#E2E8F0"/>
        <rect x="0" y="6" width="165" height="4" rx="2" fill="#0F172A"/>

        <text y="32" fill="#475569">加密引流</text>
        <text x="200" y="32" fill="#94A3B8" text-anchor="end">5</text>
        <rect x="0" y="38" width="312" height="4" rx="2" fill="#E2E8F0"/>
        <rect x="0" y="38" width="92" height="4" rx="2" fill="#0F172A"/>

        <text y="64" fill="#475569">营销 / 钓鱼</text>
        <text x="200" y="64" fill="#94A3B8" text-anchor="end">3</text>
        <rect x="0" y="70" width="312" height="4" rx="2" fill="#E2E8F0"/>
        <rect x="0" y="70" width="55" height="4" rx="2" fill="#0F172A"/>
      </g>
    </g>

    <!-- 趋势卡(只画一点点占位,不抢戏) -->
    <g transform="translate(32, 320)">
      <rect width="376" height="280" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" opacity="0.5"/>
      <text x="20" y="36" font-size="14" font-weight="700" fill="#94A3B8">趋势</text>
      <g font-size="13" fill="#CBD5E1" transform="translate(20, 80)">
        <text>· · · · · · · · · · · ·</text>
        <text y="60">· · · · · · · · · · · ·</text>
        <text y="120">· · · · · · · · · · · ·</text>
        <text y="180">· · · · · · · · · · · ·</text>
      </g>
    </g>
  </g>

  <!-- 底部浮层标题 -->
  <g transform="translate(40, 740)" opacity="0.92">
    <rect width="430" height="44" rx="22" fill="#0F172A"/>
    <text x="215" y="29" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">静默隐藏 — 不打扰浏览,正常推文照常显示</text>
  </g>
</svg>
