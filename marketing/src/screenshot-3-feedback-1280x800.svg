<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif">
  <!-- 反馈与复盘历史 — 展示 AI 自动复审 + 规则沉淀闭环 -->

  <!-- 浏览器壳 -->
  <rect width="1280" height="800" fill="#E2E8F0"/>
  <rect x="0" y="0" width="1280" height="48" fill="#F1F5F9"/>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <rect x="92" y="14" width="380" height="20" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="106" y="28" font-size="11" fill="#94A3B8">chrome-extension://...&#47;options.html#rules</text>
  <text x="1180" y="28" font-size="11" fill="#475569" text-anchor="end">TweetGuard 设置</text>

  <rect x="0" y="48" width="1280" height="752" fill="#FFFFFF"/>

  <!-- sidebar -->
  <rect x="0" y="48" width="224" height="752" fill="#F8FAFC"/>
  <line x1="224" y1="48" x2="224" y2="800" stroke="#E2E8F0" stroke-width="1"/>
  <g transform="translate(24, 80)">
    <g transform="scale(0.21)">
      <rect width="128" height="128" rx="28" fill="#0F172A"/>
      <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
      <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="36" y="14" font-size="14" font-weight="700" fill="#0F172A" letter-spacing="-0.3">TweetGuard</text>
    <text x="36" y="28" font-size="11" font-weight="400" fill="#94A3B8">v0.1.1</text>
  </g>
  <g font-size="13" font-weight="500">
    <g transform="translate(0, 140)">
      <text x="28" y="22" fill="#475569">通用</text>
      <text x="28" y="62" fill="#475569">AI 提供商</text>
      <text x="28" y="102" fill="#475569">Prompt</text>
      <rect x="12" y="120" width="200" height="34" rx="6" fill="#0F172A"/>
      <text x="28" y="142" fill="#FFFFFF" font-weight="600">规则与权重</text>
      <text x="28" y="182" fill="#475569">已识别账号</text>
      <text x="28" y="222" fill="#475569">白名单 / 黑名单</text>
      <text x="28" y="262" fill="#475569">关于</text>
    </g>
  </g>

  <!-- 主内容 -->
  <g transform="translate(224, 48)">
    <g transform="translate(48, 56)">
      <text font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.5">规则与权重</text>
      <text y="28" font-size="14" fill="#475569">AI 浏览时自动复审漏判,沉淀规则;手动反馈也会经过同一复审 prompt。两类记录在此汇总。</text>
    </g>

    <!-- 反馈与复盘历史卡片 -->
    <g transform="translate(48, 156)">
      <rect width="960" height="540" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

      <g transform="translate(28, 28)">
        <g>
          <text font-size="15" font-weight="600" fill="#0F172A">反馈与复盘历史</text>
          <rect x="138" y="-13" width="32" height="18" rx="9" fill="#0F172A"/>
          <text x="154" y="0" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">12</text>
        </g>
        <text y="22" font-size="13" fill="#475569">标签区分来源:你标记的误判,以及 AI 判定 spam 后自动复审成功沉淀的规则。</text>

        <!-- 4 条记录 -->
        <g transform="translate(0, 50)">

          <!-- 记录 1:ai_auto 漏判 -->
          <g transform="translate(0, 0)">
            <rect width="904" height="106" rx="10" fill="#F8FAFC"/>
            <g transform="translate(20, 18)">
              <!-- 漏判 chip -->
              <rect width="46" height="22" rx="4" fill="#FEF2F2"/>
              <text x="23" y="15" font-size="11" font-weight="600" fill="#B91C1C" text-anchor="middle">漏判</text>
              <!-- AI 自动 chip -->
              <rect x="54" width="56" height="22" rx="4" fill="#0F172A"/>
              <text x="82" y="15" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">AI 自动</text>
              <!-- handle -->
              <text x="124" y="15" font-size="13" font-weight="500" fill="#0F172A">@farketmezszs</text>
              <text x="852" y="15" font-size="11" fill="#94A3B8" text-anchor="end">2 分钟前</text>
            </g>
            <!-- 推文摘要 -->
            <rect x="20" y="48" width="864" height="32" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="32" y="68" font-size="12" font-family="Menlo, monospace" fill="#0F172A">这个骚的,给你们爽一下 谁要私我 vx ××××</text>
            <!-- 复审摘要 -->
            <text x="20" y="98" font-size="12" fill="#475569">
              <tspan font-weight="600" fill="#0F172A">AI 复盘:</tspan> 漏判因 L0 没有这条新模板的关键词,复审推荐沉淀。
            </text>
            <!-- chip 落库 -->
            <g transform="translate(700, 80)">
              <rect width="200" height="22" rx="4" fill="#DCFCE7"/>
              <text x="10" y="15" font-size="11" font-weight="600" fill="#166534">+ tweet_keyword: 这个骚的...</text>
            </g>
          </g>

          <!-- 记录 2:ai_auto 漏判 -->
          <g transform="translate(0, 120)">
            <rect width="904" height="106" rx="10" fill="#F8FAFC"/>
            <g transform="translate(20, 18)">
              <rect width="46" height="22" rx="4" fill="#FEF2F2"/>
              <text x="23" y="15" font-size="11" font-weight="600" fill="#B91C1C" text-anchor="middle">漏判</text>
              <rect x="54" width="56" height="22" rx="4" fill="#0F172A"/>
              <text x="82" y="15" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">AI 自动</text>
              <text x="124" y="15" font-size="13" font-weight="500" fill="#0F172A">@oznahrci</text>
              <text x="852" y="15" font-size="11" fill="#94A3B8" text-anchor="end">12 分钟前</text>
            </g>
            <rect x="20" y="48" width="864" height="32" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="32" y="68" font-size="12" font-family="Menlo, monospace" fill="#0F172A">体制内幼师 sao的很 @23_oguzhand lx</text>
            <text x="20" y="98" font-size="12" fill="#475569">
              <tspan font-weight="600" fill="#0F172A">AI 复盘:</tspan> 用罗马化绕过中文关键词;线程感染分不足以分类。
            </text>
            <g transform="translate(744, 80)">
              <rect width="156" height="22" rx="4" fill="#DCFCE7"/>
              <text x="10" y="15" font-size="11" font-weight="600" fill="#166534">+ tweet_keyword: sao的很</text>
            </g>
          </g>

          <!-- 记录 3:你标记 误判 -->
          <g transform="translate(0, 240)">
            <rect width="904" height="106" rx="10" fill="#F8FAFC"/>
            <g transform="translate(20, 18)">
              <rect width="46" height="22" rx="4" fill="#F0F9FF"/>
              <text x="23" y="15" font-size="11" font-weight="600" fill="#0369A1" text-anchor="middle">误判</text>
              <rect x="54" width="56" height="22" rx="4" fill="#1E293B"/>
              <text x="82" y="15" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">你标记</text>
              <text x="124" y="15" font-size="13" font-weight="500" fill="#0F172A">@real_user_42</text>
              <text x="852" y="15" font-size="11" fill="#94A3B8" text-anchor="end">1 小时前</text>
            </g>
            <rect x="20" y="48" width="864" height="32" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="32" y="68" font-size="12" font-family="Menlo, monospace" fill="#0F172A">早上好啊大家,今天天气真不错 ☀️</text>
            <text x="20" y="98" font-size="12" fill="#475569">
              <tspan font-weight="600" fill="#0F172A">AI 复盘:</tspan> 学习规则 lr-abc 过宽,触发率低,建议禁用。
            </text>
            <g transform="translate(748, 80)">
              <rect width="156" height="22" rx="4" fill="#FEF3C7"/>
              <text x="10" y="15" font-size="11" font-weight="600" fill="#854D0E">禁用 lr-abc123</text>
            </g>
          </g>

          <!-- 记录 4:ai_auto 漏判 -->
          <g transform="translate(0, 360)">
            <rect width="904" height="106" rx="10" fill="#F8FAFC"/>
            <g transform="translate(20, 18)">
              <rect width="46" height="22" rx="4" fill="#FEF2F2"/>
              <text x="23" y="15" font-size="11" font-weight="600" fill="#B91C1C" text-anchor="middle">漏判</text>
              <rect x="54" width="56" height="22" rx="4" fill="#0F172A"/>
              <text x="82" y="15" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">AI 自动</text>
              <text x="124" y="15" font-size="13" font-weight="500" fill="#0F172A">@claudia__rose</text>
              <text x="852" y="15" font-size="11" fill="#94A3B8" text-anchor="end">3 小时前</text>
            </g>
            <rect x="20" y="48" width="864" height="32" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
            <text x="32" y="68" font-size="12" font-family="Menlo, monospace" fill="#0F172A">她太涩了u 我真顶不住 @mengyyw 9z</text>
            <text x="20" y="98" font-size="12" fill="#475569">
              <tspan font-weight="600" fill="#0F172A">AI 复盘:</tspan> 运营手册的固定模板「她太涩了」,跨多账号反复出现。
            </text>
            <g transform="translate(744, 80)">
              <rect width="156" height="22" rx="4" fill="#DCFCE7"/>
              <text x="10" y="15" font-size="11" font-weight="600" fill="#166534">+ tweet_keyword: 她太涩了</text>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- 底部浮层标题 -->
  <g transform="translate(40, 740)" opacity="0.92">
    <rect width="430" height="44" rx="22" fill="#0F172A"/>
    <text x="215" y="29" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">AI 自动复审 — 每条漏判都沉淀成下次直接命中的规则</text>
  </g>
</svg>
