<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif">
  <!-- ═══════════ 真实 options 页 仿真 1280×800 ═══════════
       严格对齐 options.css:
         --bg #FFFFFF / --bg-soft #F8FAFC / --bg-hover #F1F5F9
         --border #E2E8F0 / --text #0F172A / --text-soft #475569 / --text-faint #94A3B8
         --accent #0F172A / --success #059669 / --danger #B91C1C
       字体由系统提供(-apple-system / PingFang SC) -->

  <!-- 浏览器 chrome 简化:窗口头(顶 48px) + 浏览器视窗 -->
  <rect width="1280" height="800" fill="#E2E8F0"/>
  <rect x="0" y="0" width="1280" height="48" fill="#F1F5F9"/>
  <!-- 红绿黄圆点 -->
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <!-- 浏览器地址栏 -->
  <rect x="92" y="14" width="380" height="20" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="106" y="28" font-size="11" fill="#94A3B8">chrome-extension://...&#47;options.html#rules</text>
  <!-- 标题 tab -->
  <text x="1180" y="28" font-size="11" fill="#475569" text-anchor="end">TweetGuard 设置</text>

  <!-- ═══════════ 扩展界面 ═══════════ -->
  <rect x="0" y="48" width="1280" height="752" fill="#FFFFFF"/>

  <!-- ───── 左侧 sidebar 224px ───── -->
  <rect x="0" y="48" width="224" height="752" fill="#F8FAFC"/>
  <line x1="224" y1="48" x2="224" y2="800" stroke="#E2E8F0" stroke-width="1"/>

  <!-- sidebar brand -->
  <g transform="translate(24, 80)">
    <!-- mini logo 24x24 -->
    <g transform="scale(0.21)">
      <rect width="128" height="128" rx="28" fill="#0F172A"/>
      <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
      <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="36" y="14" font-size="14" font-weight="700" fill="#0F172A" letter-spacing="-0.3">TweetGuard</text>
    <text x="36" y="28" font-size="11" font-weight="400" fill="#94A3B8">v0.1.1</text>
  </g>

  <!-- sidebar nav -->
  <g font-size="13" font-weight="500">
    <g transform="translate(0, 140)">
      <!-- 通用 -->
      <rect x="12" y="0" width="200" height="34" rx="6" fill="transparent"/>
      <text x="28" y="22" fill="#475569">通用</text>
      <!-- AI 提供商 -->
      <rect x="12" y="40" width="200" height="34" rx="6" fill="transparent"/>
      <text x="28" y="62" fill="#475569">AI 提供商</text>
      <!-- Prompt -->
      <rect x="12" y="80" width="200" height="34" rx="6" fill="transparent"/>
      <text x="28" y="102" fill="#475569">Prompt</text>
      <!-- 规则与权重 active -->
      <rect x="12" y="120" width="200" height="34" rx="6" fill="#0F172A"/>
      <text x="28" y="142" fill="#FFFFFF" font-weight="600">规则与权重</text>
      <!-- 已识别账号 -->
      <rect x="12" y="160" width="200" height="34" rx="6" fill="transparent"/>
      <text x="28" y="182" fill="#475569">已识别账号</text>
      <!-- 白名单 / 黑名单 -->
      <rect x="12" y="200" width="200" height="34" rx="6" fill="transparent"/>
      <text x="28" y="222" fill="#475569">白名单 / 黑名单</text>
      <!-- 关于 -->
      <rect x="12" y="240" width="200" height="34" rx="6" fill="transparent"/>
      <text x="28" y="262" fill="#475569">关于</text>
    </g>
  </g>

  <!-- ───── 右侧 main 内容区 ───── -->
  <g transform="translate(224, 48)">

    <!-- tab-header -->
    <g transform="translate(48, 56)">
      <text font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.5">规则与权重</text>
      <text y="28" font-size="14" fill="#475569">每条推文先经过硬规则一票否决,再按 13 项评分信号累加,过阈值即静默隐藏。</text>
    </g>

    <!-- ─── 卡片 1:硬规则(简洁展示)─── -->
    <g transform="translate(48, 156)">
      <rect width="960" height="186" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <g transform="translate(28, 28)">
        <text font-size="15" font-weight="600" fill="#0F172A">硬规则(一票否决,4 条)</text>
        <text y="22" font-size="13" fill="#475569">任一硬规则命中 → 直接隐藏,不进入评分。</text>

        <!-- 2x2 grid 简洁展示 4 条 -->
        <g transform="translate(0, 48)" font-size="13">
          <!-- 行 1 -->
          <rect x="0" y="0" width="440" height="44" rx="8" fill="#F8FAFC"/>
          <rect x="12" y="12" width="28" height="20" rx="4" fill="#0F172A"/>
          <text x="26" y="26" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">黑名单</text>
          <text x="52" y="22" fill="#0F172A" font-weight="500">黑名单</text>
          <text x="52" y="36" fill="#94A3B8" font-size="11">账号在你的黑名单中,一律隐藏</text>

          <rect x="456" y="0" width="440" height="44" rx="8" fill="#F8FAFC"/>
          <rect x="468" y="12" width="20" height="20" rx="4" fill="#0F172A"/>
          <text x="478" y="26" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">R7</text>
          <text x="496" y="22" fill="#0F172A" font-weight="500">显示名含中文色情引流词</text>
          <text x="496" y="36" fill="#94A3B8" font-size="11">「寻炮 / 约炮 / 点击主页 / 找男友 / 破处 / 包养」等</text>

          <!-- 行 2 -->
          <rect x="0" y="56" width="440" height="44" rx="8" fill="#F8FAFC"/>
          <rect x="12" y="68" width="24" height="20" rx="4" fill="#0F172A"/>
          <text x="24" y="82" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">R10</text>
          <text x="44" y="78" fill="#0F172A" font-weight="500">显示名含「加微 / 加 TG」 + 是回复</text>
          <text x="44" y="92" fill="#94A3B8" font-size="11">在回复里推私域联系方式的引流模板</text>

          <rect x="456" y="56" width="440" height="44" rx="8" fill="#F8FAFC"/>
          <rect x="468" y="68" width="20" height="20" rx="4" fill="#0F172A"/>
          <text x="478" y="82" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">R3</text>
          <text x="496" y="78" fill="#0F172A" font-weight="500">pump.fun 链接 + 是回复</text>
          <text x="496" y="92" fill="#94A3B8" font-size="11">加密 shill 在评论区灌币的硬模板</text>
        </g>
      </g>
    </g>

    <!-- ─── 卡片 2:AI 学习到的规则(展开)─── -->
    <g transform="translate(48, 366)">
      <rect width="960" height="338" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
      <g transform="translate(28, 28)">
        <g>
          <text font-size="15" font-weight="600" fill="#0F172A">AI 学习到的规则</text>
          <rect x="160" y="-13" width="32" height="18" rx="9" fill="#0F172A"/>
          <text x="176" y="0" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">37</text>
        </g>
        <text y="22" font-size="13" fill="#475569">AI 浏览时自动从漏判案例总结的泛化规则。本地缓存命中,零额外 API 消耗。</text>

        <!-- 列表 -->
        <g transform="translate(0, 48)">
          <rect width="904" height="232" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
          <!-- 表头分隔线无 -->

          <!-- 行模板:64 / 1fr / 90 / 70 / 80 / auto -->
          <!-- 行 1 -->
          <g transform="translate(0, 0)">
            <rect width="48" height="20" x="14" y="16" rx="4" fill="#0F172A"/>
            <text x="38" y="30" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">自动</text>
            <text x="80" y="30" font-size="12" font-family="Menlo, monospace" fill="#0F172A">tweet_keyword: 这个骚的,给你们爽一下</text>
            <text x="520" y="30" font-size="11" fill="#475569">● 中文NSFW</text>
            <text x="650" y="30" font-size="11" fill="#94A3B8" text-anchor="end">命中 8</text>
            <text x="780" y="30" font-size="11" fill="#94A3B8" text-anchor="end">2 分钟前</text>
          </g>
          <line x1="14" y1="52" x2="890" y2="52" stroke="#F1F5F9"/>

          <!-- 行 2 -->
          <g transform="translate(0, 52)">
            <rect width="48" height="20" x="14" y="16" rx="4" fill="#0F172A"/>
            <text x="38" y="30" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">自动</text>
            <text x="80" y="30" font-size="12" font-family="Menlo, monospace" fill="#0F172A">tweet_keyword: 完整版来了</text>
            <text x="520" y="30" font-size="11" fill="#475569">● 中文NSFW</text>
            <text x="650" y="30" font-size="11" fill="#94A3B8" text-anchor="end">命中 24</text>
            <text x="780" y="30" font-size="11" fill="#94A3B8" text-anchor="end">3 小时前</text>
          </g>
          <line x1="14" y1="104" x2="890" y2="104" stroke="#F1F5F9"/>

          <!-- 行 3 -->
          <g transform="translate(0, 104)">
            <rect width="48" height="20" x="14" y="16" rx="4" fill="#1E293B"/>
            <text x="38" y="30" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">你反馈</text>
            <text x="80" y="30" font-size="12" font-family="Menlo, monospace" fill="#0F172A">tweet_keyword: sao货</text>
            <text x="520" y="30" font-size="11" fill="#475569">● 中文NSFW</text>
            <text x="650" y="30" font-size="11" fill="#94A3B8" text-anchor="end">命中 15</text>
            <text x="780" y="30" font-size="11" fill="#94A3B8" text-anchor="end">昨天</text>
          </g>
          <line x1="14" y1="156" x2="890" y2="156" stroke="#F1F5F9"/>

          <!-- 行 4 -->
          <g transform="translate(0, 156)">
            <rect width="48" height="20" x="14" y="16" rx="4" fill="#0F172A"/>
            <text x="38" y="30" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">自动</text>
            <text x="80" y="30" font-size="12" font-family="Menlo, monospace" fill="#0F172A">tweet_keyword: 私聊看资源</text>
            <text x="520" y="30" font-size="11" fill="#475569">● 中文NSFW</text>
            <text x="650" y="30" font-size="11" fill="#94A3B8" text-anchor="end">命中 11</text>
            <text x="780" y="30" font-size="11" fill="#94A3B8" text-anchor="end">2 天前</text>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- 底部留一个浮层标题(贴近顶部预览体验) -->
  <g transform="translate(40, 740)" opacity="0.9">
    <rect width="380" height="44" rx="22" fill="#0F172A"/>
    <text x="190" y="29" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">规则与权重 — 三个来源,持续自学习</text>
  </g>
</svg>
