<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif">
  <!-- AI 提供商 — 7 个 provider BYOK -->

  <!-- 浏览器壳 -->
  <rect width="1280" height="800" fill="#E2E8F0"/>
  <rect x="0" y="0" width="1280" height="48" fill="#F1F5F9"/>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <rect x="92" y="14" width="380" height="20" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="106" y="28" font-size="11" fill="#94A3B8">chrome-extension://...&#47;options.html#ai</text>
  <text x="1180" y="28" font-size="11" fill="#475569" text-anchor="end">TweetGuard 设置</text>

  <rect x="0" y="48" width="1280" height="752" fill="#FFFFFF"/>

  <!-- sidebar -->
  <rect x="0" y="48" width="224" height="752" fill="#F8FAFC"/>
  <line x1="224" y1="48" x2="224" y2="800" stroke="#E2E8F0" stroke-width="1"/>
  <g transform="translate(24, 80)">
    <g transform="scale(0.21)">
      <rect width="128" height="128" rx="28" fill="#0F172A"/>
      <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
      <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="36" y="14" font-size="14" font-weight="700" fill="#0F172A" letter-spacing="-0.3">TweetGuard</text>
    <text x="36" y="28" font-size="11" font-weight="400" fill="#94A3B8">v0.1.1</text>
  </g>
  <g font-size="13" font-weight="500">
    <g transform="translate(0, 140)">
      <text x="28" y="22" fill="#475569">通用</text>
      <rect x="12" y="40" width="200" height="34" rx="6" fill="#0F172A"/>
      <text x="28" y="62" fill="#FFFFFF" font-weight="600">AI 提供商</text>
      <text x="28" y="102" fill="#475569">Prompt</text>
      <text x="28" y="142" fill="#475569">规则与权重</text>
      <text x="28" y="182" fill="#475569">已识别账号</text>
      <text x="28" y="222" fill="#475569">白名单 / 黑名单</text>
      <text x="28" y="262" fill="#475569">关于</text>
    </g>
  </g>

  <g transform="translate(224, 48)">
    <g transform="translate(48, 56)">
      <text font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.5">AI 提供商</text>
      <text y="28" font-size="14" fill="#475569">可选;不启用 AI 也能用内置规则。需要你自己提供 Key,直连官方 API,数据不经过任何中间服务器。</text>
    </g>

    <!-- 卡片 1:provider 选择 + Key -->
    <g transform="translate(48, 156)">
      <rect width="960" height="282" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

      <g transform="translate(28, 28)">
        <text font-size="15" font-weight="600" fill="#0F172A">选择 Provider(BYOK · 用你自己的 API Key)</text>
        <text y="22" font-size="13" fill="#475569">7 个主流 provider 全支持。插件不提供 Key,需要你自己注册并填入。Ollama 选项可走本地大模型,完全离线。</text>

        <!-- 7 个 provider chip(选中 DeepSeek)-->
        <g transform="translate(0, 50)" font-size="13" font-weight="500">
          <!-- DeepSeek selected -->
          <rect width="120" height="40" rx="8" fill="#0F172A"/>
          <text x="60" y="25" fill="#FFFFFF" text-anchor="middle">DeepSeek ✓</text>
          <!-- OpenAI -->
          <rect x="132" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="192" y="25" fill="#0F172A" text-anchor="middle">OpenAI</text>
          <!-- Anthropic -->
          <rect x="264" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="324" y="25" fill="#0F172A" text-anchor="middle">Anthropic</text>
          <!-- Gemini -->
          <rect x="396" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="456" y="25" fill="#0F172A" text-anchor="middle">Gemini</text>
          <!-- Groq -->
          <rect x="528" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="588" y="25" fill="#0F172A" text-anchor="middle">Groq</text>
          <!-- OpenRouter -->
          <rect x="660" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="720" y="25" fill="#0F172A" text-anchor="middle">OpenRouter</text>
          <!-- Ollama -->
          <rect x="792" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="852" y="25" fill="#0F172A" text-anchor="middle">Ollama</text>
        </g>

        <!-- API Key 行 -->
        <g transform="translate(0, 122)">
          <text font-size="13" font-weight="600" fill="#0F172A">API Key</text>
          <rect y="14" width="600" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="14" y="40" font-size="13" font-family="Menlo, monospace" fill="#475569">sk-···································xxxx</text>
          <rect x="614" y="14" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="674" y="40" font-size="13" font-weight="500" fill="#0F172A" text-anchor="middle">显示 / 隐藏</text>

          <!-- Model -->
          <text y="86" font-size="13" font-weight="600" fill="#0F172A">模型</text>
          <rect y="100" width="600" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
          <text x="14" y="126" font-size="13" fill="#0F172A">deepseek-v4-flash</text>
          <text x="586" y="126" font-size="13" fill="#94A3B8" text-anchor="end">▼</text>
        </g>
      </g>
    </g>

    <!-- 卡片 2:隐私 + 连接测试 -->
    <g transform="translate(48, 460)">
      <rect width="960" height="236" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

      <g transform="translate(28, 28)">
        <text font-size="15" font-weight="600" fill="#0F172A">隐私与连接</text>
        <text y="22" font-size="13" fill="#475569">Key 仅存在本机 storage;请求直连 provider 官方 endpoint,不经过任何中间服务。</text>

        <!-- 4 个隐私要点 -->
        <g transform="translate(0, 50)" font-size="13">
          <g>
            <circle cx="10" cy="10" r="3" fill="#059669"/>
            <text x="28" y="15" font-weight="500" fill="#0F172A">Key 仅存本地,服务器永远看不到</text>
          </g>
          <g transform="translate(450, 0)">
            <circle cx="10" cy="10" r="3" fill="#059669"/>
            <text x="28" y="15" font-weight="500" fill="#0F172A">无遥测、无埋点</text>
          </g>
          <g transform="translate(0, 32)">
            <circle cx="10" cy="10" r="3" fill="#059669"/>
            <text x="28" y="15" font-weight="500" fill="#0F172A">每条 AI 调用仅发送被识别为可疑的推文文本</text>
          </g>
          <g transform="translate(450, 32)">
            <circle cx="10" cy="10" r="3" fill="#059669"/>
            <text x="28" y="15" font-weight="500" fill="#0F172A">选 Ollama 可完全离线运行</text>
          </g>
        </g>

        <!-- 连接测试 -->
        <g transform="translate(0, 134)">
          <rect width="160" height="40" rx="8" fill="#0F172A"/>
          <text x="80" y="25" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">连接测试</text>
          <text x="180" y="26" font-size="13" font-weight="500" fill="#059669">✓ 连接成功 · 312 ms · deepseek-v4-flash</text>
        </g>
      </g>
    </g>
  </g>

  <!-- 底部浮层标题 -->
  <g transform="translate(40, 740)" opacity="0.92">
    <rect width="540" height="44" rx="22" fill="#0F172A"/>
    <text x="270" y="29" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">用你自己的 API Key(BYOK)— 7 个 provider,数据不经第三方</text>
  </g>
</svg>
