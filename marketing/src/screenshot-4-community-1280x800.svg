<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif">
  <!-- 社区规则同步 — 展示开源 + 可贡献 -->

  <!-- 浏览器壳 -->
  <rect width="1280" height="800" fill="#E2E8F0"/>
  <rect x="0" y="0" width="1280" height="48" fill="#F1F5F9"/>
  <circle cx="20" cy="24" r="6" fill="#EF4444"/>
  <circle cx="40" cy="24" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="24" r="6" fill="#10B981"/>
  <rect x="92" y="14" width="380" height="20" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="106" y="28" font-size="11" fill="#94A3B8">chrome-extension://...&#47;options.html#rules</text>
  <text x="1180" y="28" font-size="11" fill="#475569" text-anchor="end">TweetGuard 设置</text>

  <rect x="0" y="48" width="1280" height="752" fill="#FFFFFF"/>

  <!-- sidebar -->
  <rect x="0" y="48" width="224" height="752" fill="#F8FAFC"/>
  <line x1="224" y1="48" x2="224" y2="800" stroke="#E2E8F0" stroke-width="1"/>
  <g transform="translate(24, 80)">
    <g transform="scale(0.21)">
      <rect width="128" height="128" rx="28" fill="#0F172A"/>
      <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
      <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="36" y="14" font-size="14" font-weight="700" fill="#0F172A" letter-spacing="-0.3">TweetGuard</text>
    <text x="36" y="28" font-size="11" font-weight="400" fill="#94A3B8">v0.1.1</text>
  </g>
  <g font-size="13" font-weight="500">
    <g transform="translate(0, 140)">
      <text x="28" y="22" fill="#475569">通用</text>
      <text x="28" y="62" fill="#475569">AI 提供商</text>
      <text x="28" y="102" fill="#475569">Prompt</text>
      <rect x="12" y="120" width="200" height="34" rx="6" fill="#0F172A"/>
      <text x="28" y="142" fill="#FFFFFF" font-weight="600">规则与权重</text>
      <text x="28" y="182" fill="#475569">已识别账号</text>
      <text x="28" y="222" fill="#475569">白名单 / 黑名单</text>
      <text x="28" y="262" fill="#475569">关于</text>
    </g>
  </g>

  <g transform="translate(224, 48)">
    <g transform="translate(48, 56)">
      <text font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.5">社区规则同步</text>
      <text y="28" font-size="14" fill="#475569">从 GitHub 仓库自动同步社区共建的规则;不认可的可单条「否决」,贡献你的规则也只需一键。</text>
    </g>

    <!-- 社区规则同步卡片 -->
    <g transform="translate(48, 156)">
      <rect width="960" height="540" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

      <g transform="translate(28, 28)">
        <text font-size="15" font-weight="600" fill="#0F172A">社区规则同步(GitHub)</text>
        <text y="22" font-size="13" fill="#475569">仅推文关键词;显示名 / 用户名类规则会被自动拒绝,与本地安全约束一致。</text>

        <!-- 自动同步行 -->
        <g transform="translate(0, 50)">
          <rect width="904" height="64" rx="10" fill="#F8FAFC"/>
          <g transform="translate(20, 14)">
            <text font-size="14" font-weight="600" fill="#0F172A">启用自动同步</text>
            <text y="20" font-size="12" fill="#94A3B8">浏览器启动时 + 每 24 小时拉取一次;也可随时手动「立即同步」。</text>
          </g>
          <!-- switch on -->
          <g transform="translate(842, 22)">
            <rect width="40" height="22" rx="11" fill="#0F172A"/>
            <circle cx="29" cy="11" r="9" fill="#FFFFFF"/>
          </g>
        </g>

        <!-- URL 与按钮 -->
        <g transform="translate(0, 130)">
          <text font-size="12" fill="#94A3B8">规则来源(固定):</text>
          <text x="108" font-size="11" font-family="Menlo, monospace" fill="#475569">https://raw.githubusercontent.com/viewer12/tweetguard/main/community-rules.json</text>

          <!-- 按钮 -->
          <g transform="translate(0, 18)">
            <rect width="92" height="32" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
            <text x="46" y="21" font-size="13" font-weight="500" fill="#0F172A" text-anchor="middle">立即同步</text>

            <rect x="104" width="128" height="32" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
            <text x="168" y="21" font-size="13" font-weight="500" fill="#0F172A" text-anchor="middle">贡献我的规则 →</text>

            <text x="248" y="21" font-size="12" fill="#94A3B8">上次同步 5 分钟前 · 已加载 37 条社区规则</text>
          </g>
        </g>

        <!-- 已加载规则 -->
        <g transform="translate(0, 226)">
          <text font-size="13" font-weight="600" fill="#475569">已加载的社区规则</text>
          <rect x="148" y="-13" width="32" height="18" rx="9" fill="#F1F5F9"/>
          <text x="164" y="0" font-size="11" font-weight="600" fill="#0F172A" text-anchor="middle">37</text>
          <text x="190" y="0" font-size="11" fill="#94A3B8">只读 · 不认可的可「否决」</text>

          <!-- 列表 -->
          <g transform="translate(0, 14)">
            <rect width="904" height="240" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

            <!-- 行模板:52 / 1fr / 130 / 否决 -->
            <g transform="translate(0, 0)">
              <rect x="14" y="14" width="32" height="20" rx="4" fill="#1E293B"/>
              <text x="30" y="28" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">社区</text>
              <text x="64" y="29" font-size="12" font-family="Menlo, monospace" fill="#0F172A">完整版来了</text>
              <text x="540" y="29" font-size="12" fill="#475569">● 中文NSFW</text>
              <rect x="822" y="13" width="56" height="22" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
              <text x="850" y="28" font-size="11" fill="#475569" text-anchor="middle">否决</text>
            </g>
            <line x1="14" y1="48" x2="890" y2="48" stroke="#F1F5F9"/>

            <g transform="translate(0, 48)">
              <rect x="14" y="14" width="32" height="20" rx="4" fill="#1E293B"/>
              <text x="30" y="28" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">社区</text>
              <text x="64" y="29" font-size="12" font-family="Menlo, monospace" fill="#0F172A">私聊看资源</text>
              <text x="540" y="29" font-size="12" fill="#475569">● 中文NSFW</text>
              <rect x="822" y="13" width="56" height="22" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
              <text x="850" y="28" font-size="11" fill="#475569" text-anchor="middle">否决</text>
            </g>
            <line x1="14" y1="96" x2="890" y2="96" stroke="#F1F5F9"/>

            <g transform="translate(0, 96)">
              <rect x="14" y="14" width="32" height="20" rx="4" fill="#1E293B"/>
              <text x="30" y="28" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">社区</text>
              <text x="64" y="29" font-size="12" font-family="Menlo, monospace" fill="#0F172A">附近的哥哥滴我</text>
              <text x="540" y="29" font-size="12" fill="#475569">● 中文NSFW</text>
              <rect x="822" y="13" width="56" height="22" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
              <text x="850" y="28" font-size="11" fill="#475569" text-anchor="middle">否决</text>
            </g>
            <line x1="14" y1="144" x2="890" y2="144" stroke="#F1F5F9"/>

            <g transform="translate(0, 144)">
              <rect x="14" y="14" width="32" height="20" rx="4" fill="#1E293B"/>
              <text x="30" y="28" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">社区</text>
              <text x="64" y="29" font-size="12" font-family="Menlo, monospace" fill="#0F172A">高级外围玩玩</text>
              <text x="540" y="29" font-size="12" fill="#475569">● 中文NSFW</text>
              <rect x="822" y="13" width="56" height="22" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
              <text x="850" y="28" font-size="11" fill="#475569" text-anchor="middle">否决</text>
            </g>
            <line x1="14" y1="192" x2="890" y2="192" stroke="#F1F5F9"/>

            <g transform="translate(0, 192)">
              <rect x="14" y="14" width="32" height="20" rx="4" fill="#1E293B"/>
              <text x="30" y="28" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">社区</text>
              <text x="64" y="29" font-size="12" font-family="Menlo, monospace" fill="#0F172A">Cherish small simple moments deeply always</text>
              <text x="540" y="29" font-size="12" fill="#475569">● 互动 bot</text>
              <rect x="822" y="13" width="56" height="22" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
              <text x="850" y="28" font-size="11" fill="#475569" text-anchor="middle">否决</text>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- 底部浮层标题 -->
  <g transform="translate(40, 740)" opacity="0.92">
    <rect width="450" height="44" rx="22" fill="#0F172A"/>
    <text x="225" y="29" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">社区共建规则库 — 开源、可贡献、一键同步</text>
  </g>
</svg>
