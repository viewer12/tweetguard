<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 整体:对齐扩展配置页的浅色调 + 深色 accent + 10px 圆角语言 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- 左上:logo + 品牌名 -->
  <g transform="translate(32, 32)">
    <g transform="scale(0.42)">
      <rect width="128" height="128" rx="28" fill="#0F172A"/>
      <path d="M64 20 L22 36 L22 70 C22 94 40 112 64 118 C88 112 106 94 106 70 L106 36 Z" fill="#F8FAFC"/>
      <path d="M46 66 L58 78 L84 50" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="68" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
          font-size="26" font-weight="700" fill="#0F172A" letter-spacing="-0.5">TweetGuard</text>
  </g>

  <!-- 主标语 -->
  <text x="32" y="148" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
        font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.6">静默过滤 X 信息流</text>
  <text x="32" y="182" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
        font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.6">里的垃圾推文</text>

  <!-- 副标语 -->
  <text x="32" y="212" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif"
        font-size="13" font-weight="400" fill="#475569" letter-spacing="0">色情 bot · 加密引流 · 营销号</text>

  <!-- 底部 chip 卖点(对齐 options.css 里 chip 视觉) -->
  <g transform="translate(32, 232)">
    <!-- chip 1 -->
    <rect x="0" y="0" width="92" height="26" rx="13" fill="#0F172A"/>
    <text x="46" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="11.5" font-weight="500" fill="#FFFFFF" text-anchor="middle">完全本地</text>
    <!-- chip 2 -->
    <rect x="100" y="0" width="92" height="26" rx="13" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="146" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="11.5" font-weight="500" fill="#475569" text-anchor="middle">AI 复审</text>
    <!-- chip 3 -->
    <rect x="200" y="0" width="92" height="26" rx="13" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="246" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="11.5" font-weight="500" fill="#475569" text-anchor="middle">开源</text>
  </g>
</svg>
